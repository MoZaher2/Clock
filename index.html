<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Clock</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="./logo.png">

</head>

<body>
    <div class="cont">
        <div class="circle">
            <div class="h"></div>
            <div class="s"></div>
            <div class="m"></div>
            <div class="dot"></div>
            <div class="num12">12</div>
            <div class="num3">3</div>
            <div class="num6">6</div>
            <div class="num9">9</div>
        </div>
        <div class="clock">
            <p class="numH"></p>
            <p class="double-dot">:</p>
            <p class="numM"></p>
            <p class="double-dot">:</p>
            <p class="numS"></p>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
